{% extends "base.html" %}
{% block title %}Admin Login — College Ready{% endblock %}
{% block content %}
<style>
  .login-container { max-width: 400px; margin: 80px auto; padding: 0 20px; }
  .login-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 16px; padding: 32px; }
  .login-card h2 { text-align: center; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 12px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 15px; }
  .login-btn { width: 100%; padding: 14px; background: #191919; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; background: #FEF2F2; color: #991B1B; }
</style>
<div class="login-container">
  <div class="login-card">
    <h2>Admin Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <button type="submit" class="login-btn">Log In</button>
    </form>
  </div>
</div>
{% endblock %}
